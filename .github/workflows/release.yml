name: release

# Cut a release by pushing a tag like `v0.1.0`:
#   - builds the `enjo` binary for macOS arm64 and x86_64
#   - publishes a GitHub Release with the tarballs
#   - regenerates Formula/enjo.rb (this repo doubles as the Homebrew tap)
# Install on any machine afterwards with:  brew install stoykotolev/enjo/enjo

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.target }}
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-14
          - target: x86_64-apple-darwin
            os: macos-13
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Pin the crate version to the tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          # BSD sed (macOS runners) in-place edit.
          sed -i '' -E "s/^version = \".*\"/version = \"${VERSION}\"/" tui/Cargo.toml

      - name: Build release binary
        working-directory: tui
        run: cargo build --release

      - name: Package tarball + checksum
        run: |
          tar -czf "enjo-${{ matrix.target }}.tar.gz" -C tui/target/release enjo
          shasum -a 256 "enjo-${{ matrix.target }}.tar.gz" | awk '{print $1}' \
            > "enjo-${{ matrix.target }}.tar.gz.sha256"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: |
            enjo-${{ matrix.target }}.tar.gz
            enjo-${{ matrix.target }}.tar.gz.sha256

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}

      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            dist/enjo-aarch64-apple-darwin.tar.gz \
            dist/enjo-x86_64-apple-darwin.tar.gz \
            --title "${GITHUB_REF_NAME}" --generate-notes

      - name: Regenerate the Homebrew formula
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          ARM_SHA="$(cat dist/enjo-aarch64-apple-darwin.tar.gz.sha256)"
          INTEL_SHA="$(cat dist/enjo-x86_64-apple-darwin.tar.gz.sha256)"
          mkdir -p Formula
          sed \
            -e "s|@REPO@|${GITHUB_REPOSITORY}|g" \
            -e "s|@TAG@|${GITHUB_REF_NAME}|g" \
            -e "s|@VERSION@|${VERSION}|g" \
            -e "s|@ARM_SHA@|${ARM_SHA}|g" \
            -e "s|@INTEL_SHA@|${INTEL_SHA}|g" \
            packaging/enjo.rb.tmpl > Formula/enjo.rb
          cat Formula/enjo.rb

      - name: Commit the formula back to the tap
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/enjo.rb
          git commit -m "Update formula for ${GITHUB_REF_NAME} [skip ci]" \
            || { echo "formula unchanged"; exit 0; }
          git push origin "HEAD:${{ github.event.repository.default_branch }}"
